{% extends "layout.html" %}

{% block title %}
addApp Page
{% endblock %}

{% block content %}
<h1>Welcome to the App Page</h1>
<p>This is the content of the App page.</p>

<div class="grid grid-cols-3 gap-4 m-4">

{% for shop in shop_list  %}

    <div class="shop-item">
        <img class="rounded" src="{{shop.image.url}}" alt="shop.name">
        <h2 class="text-2xl font-bold">{{shop.name}}</h2>
        <a href="{% url 'shop_detail' shop.id %}">
            <button type="button" class="bg-blue-500 text-white px-4 py-2 rounded">
                {{shop.type}}-{{shop.id}}
            </button>
        </a>
    </div>
{% endfor %}

</div>

{% endblock %}
